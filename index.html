<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Edrys module metadata -->
  <meta name="description" content="ROS2 GUI streamed via XPRA (self-hosted HTML5 client)" />
  <meta name="show-in" content="*" />
  <meta name="edrys:layout" content="full-width" />

  <meta
    name="module-config"
    content="{
      'config': {
        'server': {
          'type': string,
          'hint': 'XPRA server host:port, e.g. 192.168.137.108:14500 (default: localhost:14500)'
        }
      },
    }"
  />

  <title>ROS2 GUI (XPRA Viewer)</title>
  <script src="https://edrys-labs.github.io/module/edrys.js"></script>
  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
    }
    #container {
      position: relative;
      height: 100%;
      width: 100%;
      display: flex;
    }
    #viewer {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      border: none;
      background: black;
    }
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 6px;
      background: #222;
      color: #ddd;
      text-align: center;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="loading">Connecting to XPRA server…</div>
    <iframe id="viewer" src="about:blank" allowfullscreen allow="clipboard-read; clipboard-write; local-network-access"></iframe>
  </div>

  <script>
    const DEFAULT_SERVER = "localhost:14500";

    // Path to the self-hosted xpra-html5 client, relative to this file.
    // If this index.html lives at the repo root and the client is in /client,
    // this resolves correctly on GitHub Pages automatically.
    const CLIENT_PATH = "client/index.html";

    const frame = document.getElementById("viewer");
    const loading = document.getElementById("loading");

    frame.onload = () => {
      if (frame.src !== "about:blank") {
        loading.style.display = "none";
      }
    };

    function setViewerTarget(hostPort) {
      const raw = (hostPort && hostPort.trim()) || DEFAULT_SERVER;

      // Strip any accidental http:// or https:// prefix, trailing slashes,
      // and any path the user might have typed (e.g. "http://host:port/path")
      const cleaned = raw
        .replace(/^https?:\/\//, "")
        .replace(/\/.*$/, "")   // drop everything from the first slash onward
        .trim();
      const [host, port] = cleaned.split(":");

      const params = new URLSearchParams({
        server: host || "localhost",
        port: port || "14500",
        ssl: "false",       // Jetson XPRA is plain ws://, not wss://
        path: "/",           // IMPORTANT: without this, xpra-html5 defaults
                              // the websocket path to *this page's* URL path,
                              // which is wrong when self-hosted under /client/
        floating_menu: "true",
        reconnect: "true",
        sharing: "true",     // allow multiple students to view simultaneously
        steal: "false",      // don't kick out an already-connected viewer
        keyboard: "true",
        clipboard: "true",
      });

      const target = `${CLIENT_PATH}?${params.toString()}`;

      if (!frame.src.endsWith(target)) {
        loading.style.display = "block";
        frame.src = target;
      }
    }

    Edrys.onReady(() => {
      console.log("XPRA module loaded. config:", Edrys.module?.config);
      setViewerTarget(Edrys.module?.config?.server);
    });

    Edrys.onUpdate((e) => {
      console.log("XPRA module config updated:", e?.module?.config);
      setViewerTarget(e?.module?.config?.server);
    });
  </script>
</body>
</html>
