<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Edrys module metadata -->
  <meta name="description" content="ROS2 GUI streamed via XPRA HTML5 client" />
  <meta name="show-in" content="*" />

  <meta
    name="module-config"
    content="{
      'config': {
        'server': {
          'type': string,
          'hint': 'XPRA server host:port, e.g. 192.168.137.108:14500 (default: localhost:14500)'
        }
      },
    }"
  />

  <title>ROS2 GUI (XPRA Viewer)</title>

  <!-- Edrys -->
  <script src="https://edrys-labs.github.io/module/edrys.js"></script>

  <!-- XPRA Client CSS -->
  <link rel="stylesheet" href="https://abhi-creator1.github.io/module-xpra-gui/client/css/client.css">
  <link rel="stylesheet" href="https://abhi-creator1.github.io/module-xpra-gui/client/css/spinner.css">
  <link rel="stylesheet" href="https://abhi-creator1.github.io/module-xpra-gui/client/css/menu.css"/>
  <link rel="stylesheet" href="https://abhi-creator1.github.io/module-xpra-gui/client/css/menu-skin.css"/>
  <link rel="stylesheet" href="https://abhi-creator1.github.io/module-xpra-gui/client/css/icon.css"/>

  <!-- XPRA Client JavaScript Libraries -->
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/es6-shim.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/AudioContextMonkeyPatch.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/jquery.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/jquery-ui.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/jquery.ba-throttle-debounce.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/bencode.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/zlib.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/lz4.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/brotli_decode.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/forge.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/jsmpeg.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/broadway/Decoder.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/aurora/aurora.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/aurora/aurora-xpra.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/FileSaver.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/lib/jszip.js"></script>

  <!-- Config interceptor MUST load before Utilities.js and Client.js -->
  <script src="https://abhi-creator1.github.io/module-xpra-gui/config-interceptor.js"></script>

  <!-- XPRA Client Core -->
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Keycodes.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Protocol.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Window.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Notifications.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Utilities.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/MediaSourceUtil.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Client.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Menu.js"></script>
  <script src="https://abhi-creator1.github.io/module-xpra-gui/client/js/Menu-custom.js"></script>

  <!-- Edrys initialization AFTER all XPRA scripts -->
  <script src="https://abhi-creator1.github.io/module-xpra-gui/init-xpra.js"></script>

  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
    }
  </style>
</head>
<body>
  <!-- XPRA Client UI loaded directly (no iframe!) -->
  <div id="dpi" style="width: 1in; height: 1in; left: -100%; top: -100%; position: absolute;"></div>

  <div id="progress" class="overlay" style="display: none">
    <p id="progress-label"></p>
    <p id="progress-details"></p>
    <progress id="progress-bar" max="100" value="10"></progress>
  </div>

  <div id="screen" style="width: 100%; height:100%;"></div>
</body>
</html>
